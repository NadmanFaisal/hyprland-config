# Decoration Settings

# Hyprland Wiki Links
# Animation - https://wiki.hyprland.org/Configuring/Animations/
# Decoration - https://wiki.hyprland.org/Configuring/Variables/#decoration

# Sourcing colors generated by wallust
source = $HOME/.config/hypr/wallust/wallust-hyprland.conf

general {
  border_size = 3
  gaps_in = 2
  gaps_out = 2

  # Wallust automatic colors
  #col.active_border = $color12
  #col.inactive_border = $color10

  # Custom Nord colors
  col.active_border = rgb(88c0d0) rgb(81a1c1) 45deg
  col.inactive_border = rgb(3b4252)
}

decoration {
  rounding = 5
  
  active_opacity = 1.0
  inactive_opacity = 1.0
  fullscreen_opacity = 1.0

  dim_inactive = false
  dim_strength = 0.1
  dim_special = 0.8

  shadow {
    enabled = true
    range = 3
    render_power = 1

    # wallust automatic colors
    color = $color10
    color_inactive = $color12

    # Custom Nord colors
    color = rgba(88c0d099)
    color_inactive = rgba(3b425266)

  }

  blur {
    enabled = true
    size = 6
    passes = 3
    new_optimizations = true
    xray = true
    ignore_opacity = true
    special = true
    popups = true
  }
}

group {
  col.border_active = $color15

	groupbar {
		col.active = $color0
  }
}
