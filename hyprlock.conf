# /* ---- 💫 Asymmetrical & Bold 💫 ---- */

source = $HOME/.config/hypr/wallust/wallust-hyprland.conf
$Scripts = $HOME/.config/hypr/scripts

general {
    grace = 1
    fractional_scaling = 2
    immediate_render = true
}

background {
    monitor =
    path = $HOME/.config/hypr/wallpaper_effects/.wallpaper_current
    blur_passes = 2 
    blur_size = 5
    brightness = 0.5000
}

# --- MASSIVE TIME ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(255, 255, 255, 0.9)
    font_size = 180
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 100, -100
    halign = left
    valign = top
}

# --- DATE ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgba(255, 255, 255, 0.5)
    font_size = 30
    font_family = JetBrainsMono Nerd Font
    position = 120, -360
    halign = left
    valign = top
}

# --- INPUT FIELD (Underline Style) ---
input-field {
    monitor =
    size = 350, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = false
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(0, 0, 0, 0)
    font_color = rgba(255, 255, 255, 1)
    fade_on_empty = false
    font_family = JetBrainsMono Nerd Font
    placeholder_text = <i><span foreground="##ffffff80">Password...</span></i>
    hide_input = false
    position = 120, 150
    halign = left
    valign = bottom
}

# --- BATTERY ---
label {
    monitor =
    text = cmd[update:1000] echo "$($Scripts/Battery.sh)"
    color = rgba(255, 255, 255, 0.6)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 120, 100
    halign = left
    valign = bottom
}
